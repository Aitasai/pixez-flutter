name: Build Novel Translate APK

# 在 fork 仓库里手动触发：Actions 选项卡 → Build Novel Translate APK → Run workflow
# 也可在 push master 时自动跑
on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # cargokit / rhttp 在仓库内（非 submodule），但稳妥起见保留递归
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # rhttp 通过 cargokit 在 gradle 阶段交叉编译 Rust 代码到 .so，
      # 需要真实的 Rust 工具链 + android targets。
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Configure Android SDK & NDK (for cargokit)
        run: |
          set -e
          echo "ANDROID_HOME=$ANDROID_HOME"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          # 装一个固定版本 NDK，并暴露给 cargokit/gradle
          "$SDKMANAGER" "ndk;27.0.12077973" > /dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Flutter version check
        run: flutter --version

      - name: Fetch dart/flutter dependencies
        run: flutter pub get

      # 上游 rhttp 子包没把 freezed/flutter_rust_bridge 生成产物 commit 进来
      # （frb_generated.dart 里引用的 sealed class 子类全部 .freezed.dart 缺失），
      # 必须对 rhttp 子包单独跑一次 build_runner 才能编译。主工程的
      # build_runner 不会处理 path 依赖里的子包。
      - name: Generate rhttp missing files (freezed / frb)
        working-directory: plugins/rhttp/rhttp
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          echo "--- generated files now present? ---"
          find lib -name "*.freezed.dart" -o -name "frb_generated.freezed.dart" | head

      # 改动了 novel_store.dart（新增 mobx @observable/@action），必须重新 codegen
      - name: Run codegen (mobx / json / riverpod / freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate signing keystore (debug-grade, for installable release APK)
        working-directory: android
        run: |
          set -e
          # 未签名 release APK 安装时报 "packageInfo is null" / 错误 33，
          # 这里生成一个临时 keystore 并写 key.properties 触发
          # build.gradle.kts 里的 release signingConfig 分支。
          # 注意：build.gradle.kts 用 `file(it)` 解析 storeFile 路径，
          # 是相对 android/app/ 的，所以 keystore 必须放在 android/app/ 下。
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=PixEz Translate, OU=CI, O=local, L=local, S=local, C=CN"
          cat > key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=debug.keystore
          EOF
          echo "--- key.properties ---"; cat key.properties
          ls -lh app/debug.keystore

      - name: Build release APK (unsigned)
        run: |
          flutter build apk --release \
            --target-platform android-arm64,android-arm,android-x64

      # Gradle 默认使用 v2/v3 签名但跳过 v1（JAR 签名）——某些 Android 机型
      # 在只 v2/v3 时报 INSTALL_PARSE_FAILED / packageInfo is null。
      # 这里用 apksigner 把 v1+v2+v3 全套打上，保证任何 Android 版本都能装。
      - name: Sign APK with apksigner (v1 + v2 + v3)
        run: |
          set -e
          APK=build/app/outputs/flutter-apk/app-release.apk
          # build-tools 在 $ANDROID_HOME/build-tools/<version>/ 下
          BT=$(ls -d "$ANDROID_HOME/build-tools"/*/ | sort -V | tail -1)
          echo "build-tools dir: $BT"
          APKSIGNER="$BT/apksigner"
          ZIPALIGN="$BT/zipalign"
          ls -l "$APKSIGNER" "$ZIPALIGN"
          # 先 zipalign -p 4 字节对齐（未对齐 v1/v2 都可能装不上）
          "$ZIPALIGN" -p -f 4 "$APK" "$APK.aligned"
          mv "$APK.aligned" "$APK"
          # 用刚才生成的 keystore 做全版本签名
          "$APKSIGNER" sign \
            --ks android/app/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled false \
            "$APK"
          echo "--- verify ---"
          "$APKSIGNER" verify --print-certs "$APK" 2>&1 | head -20

      - name: Show APK info & sha256
        run: |
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          sha256sum build/app/outputs/flutter-apk/app-release.apk
          # 列 META-INF 印证 v1 签名文件已存在
          python3 -c "
          import zipfile
          z=zipfile.ZipFile('build/app/outputs/flutter-apk/app-release.apk')
          sig=[n for n in z.namelist() if n.startswith('META-INF/') and (n.endswith('.RSA') or n.endswith('.SF') or n.endswith('.MF'))]
          print('META-INF v1 signature files:', sig if sig else '【仍无 v1 签名】')
          data=open('build/app/outputs/flutter-apk/app-release.apk','rb').read()
          print('v2/v3 APK Sig Block 42 magic present:', data.rfind(b'APK Sig Block 42')!=-1)
          "

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixez-novel-translate-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30